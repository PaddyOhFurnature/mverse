[package]
name = "metaverse_core"
version = "0.1.0"
edition = "2024"

[dependencies]
# Phase 1: Coordinate system
geoconv = "0.1"  # GPS (lat/lon/alt) ↔ ECEF conversions, WGS84

rayon = "1"
sha2 = "0.10"
serde = { version = "1", features = ["derive"] }
bincode = "1"
dirs = "5"
reqwest = { version = "0.12", features = ["blocking", "json", "stream"] }
tokio = { version = "1", features = ["rt", "time", "sync", "macros", "rt-multi-thread"] }
futures = "0.3"
tiff = "0.11"  # TIFF/GeoTIFF parsing for SRTM elevation data
serde_json = "1"
wgpu = { version = "24", features = ["wgsl"] }
winit = "0.30"
pollster = "0.4"
glam = "0.29"
bytemuck = { version = "1", features = ["derive"] }
zip = "0.6"
noise = { version = "0.9.0", features = ["images"] }
png = "0.17"
image = "0.25"

# Continuous query system (Phase 1)
rstar = { version = "0.12", features = ["serde"] }  # R*-tree spatial index
lru = "0.12"  # LRU cache for warm cache tier

[dev-dependencies]
tempfile = "3"
env_logger = "0.11"

