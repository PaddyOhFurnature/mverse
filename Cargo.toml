[package]
name = "metaverse_core"
version = "0.1.0"
edition = "2024"

[dependencies]
rayon = "1"
sha2 = "0.10"
serde = { version = "1", features = ["derive"] }
bincode = "1"
dirs = "5"
reqwest = { version = "0.12", features = ["blocking", "json"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
